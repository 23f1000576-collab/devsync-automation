name: Daily Auto Commit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create/update file
        run: echo "Updated: $(date)" >> log.txt

      - name: Commit changes - 23f1000576@ds.study.iitm.ac.in
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add log.txt
          git commit -m "Auto update" || echo "No changes"
          git push
